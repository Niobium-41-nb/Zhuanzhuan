<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" data-diagram-type="CLASS" style="width:790px;height:686px;background:#FFFFFF;" width="790px" height="686px" viewBox="0 0 790 686" zoomAndPan="magnify" preserveAspectRatio="none" contentStyleType="text/css"><?plantuml 1.2026.7beta8?><defs/><g font-family="sans-serif" lengthAdjust="spacing"><g class="legend" data-source-line="1"><rect x="12" y="22" width="759.376" height="645.578" fill="#DDD" style="stroke:#000;stroke-width:1;" rx="7.5" ry="7.5"/><text x="17" y="39.995" fill="#000" font-size="14" textLength="399.301">The plugin you are using seems to generated a bad URL.</text><text x="17" y="56.292" fill="#000" font-size="14" textLength="295.887">This URL does not look like DEFLATE data.</text><text x="17" y="72.589" fill="#000" font-size="14" textLength="367.664">It looks like your plugin is using HUFFMAN encoding.</text><text x="17" y="88.886" fill="#000" font-size="14"> </text><text x="17" y="105.183" fill="#000" font-size="14" textLength="671.706">This means you have now to add an header ~1 to your data. For example, you have to change:</text><text x="17" y="121.479" fill="#000" font-size="14" textLength="552.146">http://www.plantuml.com/plantuml/png/tVhbTxtHFH73r5jSB9ttQDYXCVmqFE...</text><text x="17" y="137.776" fill="#000" font-size="14" textLength="14.055">to</text><text x="17" y="154.073" fill="#000" font-size="14" textLength="572.783">http://www.plantuml.com/plantuml/png/~1tVhbTxtHFH73r5jSB9ttQDYXCVmqFE...</text><text x="17" y="170.37" fill="#000" font-size="14"> </text><text x="17" y="186.667" fill="#000" font-size="14" textLength="138.277">It will work this way</text><text x="17" y="202.964" fill="#000" font-size="14" textLength="428.148">You may contact the PlantUML team at plantuml@gmail.com</text><text x="17" y="219.261" fill="#000" font-size="14" textLength="749.376">But you should also probably contact the plugin authors you are currently using and send them this image</text><text x="17" y="235.558" fill="#000" font-size="14"> </text><text x="17" y="251.854" fill="#000" font-size="14" textLength="232.545">For the record, here is your data:</text><text x="17" y="268.151" fill="#000" font-size="14"> </text><text x="17" y="284.448" fill="#000" font-size="14" textLength="703.09">tVhbTxtHFH73r5jSB9ttQDYXCVmqFENMaxUoAlO1T9awO7ZHrHc2s7OmboTUKCWF3pI2RJXaqkojIVVC</text><text x="17" y="300.745" fill="#000" font-size="14" textLength="696.855">oUSp0iQk7X pWEOe8hd69upde9ZQ4oJkec c88035zrry6bAXFhNLfWGaJAmQYaGqZ4y16luYI6bSNGw</text><text x="17" y="317.042" fill="#000" font-size="14" textLength="647.78">aaJrKYRmGFcJn2Ua4 jNiYkJEBU5Zxu ZHJyEiRzTBe IJfLOVZYWa9zZumqL54rOf pzcgeBujgOunf</text><text x="17" y="333.339" fill="#000" font-size="14" textLength="701.374">ZXp6OhStiLZGkIrNBlFDYaVBlXWdAMP82JRse0ewQj8lKB w83DWmKbGOOhMSAhgjOOozik3UylBBYB0</text><text x="17" y="349.636" fill="#000" font-size="14" textLength="652.552">7h52vjmwn91ZXZg-eXhk--TXq fbnXtP7L9vnP7626vnO6lUGr0T-iH74JfjF3fsgx Pn 5E5KmU5 RV</text><text x="17" y="365.933" fill="#000" font-size="14" textLength="681.03">k3CXwiiiagHNlN8tL1ZQZun9rCuzYFnHTVJAHxaXZ98rLmemcll0zdLpVYtsuioGwGwA-2oD3NTVG5 a</text><text x="17" y="382.229" fill="#000" font-size="14" textLength="653.256">8iBIE1OtK8-n gAaTI9sMN67jlsY8kWCrDtx6CXnrqxRFgX0pXWig5cLqFJe-BhO6co408C tLi6kEk7</text><text x="17" y="398.526" fill="#000" font-size="14" textLength="713.303">h01fSmO1SfW0Z6JwolJRNRXGQS0wgvwVlhkHAm KqsbqVK9iUUBXipVSpbxQClCwIGr-gmWo8gWVaESy</text><text x="17" y="414.823" fill="#000" font-size="14" textLength="662.348">MDYGH28jTurUFIRnsu6ju6v-3UNc4qxGNeLLlAbW62TJjxMIN4Poz4JunfH2gAyQOxjyl iiGjWY8w00</text><text x="17" y="431.12" fill="#000" font-size="14" textLength="663.134">0iJa11dUYbokdibjoupmfVd12G6qEzHboJoKVH1PgGTJZR51AjhLtRRxRhVIz6r4-pMuuvUaT3yftKlw</text><text x="17" y="447.417" fill="#000" font-size="14" textLength="694.121">agjqOKZS sg7vMGpAtpXSrPlheI8aF8a99QZpxBerFUTNcDDkKQunJPIsRQNBS1KNqoK9ETRdXgN