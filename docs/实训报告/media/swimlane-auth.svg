<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" data-diagram-type="CLASS" style="width:790px;height:507px;background:#FFFFFF;" width="790px" height="507px" viewBox="0 0 790 507" zoomAndPan="magnify" preserveAspectRatio="none" contentStyleType="text/css"><?plantuml 1.2026.7beta8?><defs/><g font-family="sans-serif" lengthAdjust="spacing"><g class="legend" data-source-line="1"><rect x="12" y="22" width="759.376" height="466.313" fill="#DDD" style="stroke:#000;stroke-width:1;" rx="7.5" ry="7.5"/><text x="17" y="39.995" fill="#000" font-size="14" textLength="399.301">The plugin you are using seems to generated a bad URL.</text><text x="17" y="56.292" fill="#000" font-size="14" textLength="295.887">This URL does not look like DEFLATE data.</text><text x="17" y="72.589" fill="#000" font-size="14" textLength="367.664">It looks like your plugin is using HUFFMAN encoding.</text><text x="17" y="88.886" fill="#000" font-size="14"> </text><text x="17" y="105.183" fill="#000" font-size="14" textLength="671.706">This means you have now to add an header ~1 to your data. For example, you have to change:</text><text x="17" y="121.479" fill="#000" font-size="14" textLength="561.839">http://www.plantuml.com/plantuml/png/jVRBTxpBGL3Pr9jGi6YHsWDSwKFWC0...</text><text x="17" y="137.776" fill="#000" font-size="14" textLength="14.055">to</text><text x="17" y="154.073" fill="#000" font-size="14" textLength="582.477">http://www.plantuml.com/plantuml/png/~1jVRBTxpBGL3Pr9jGi6YHsWDSwKFWC0...</text><text x="17" y="170.37" fill="#000" font-size="14"> </text><text x="17" y="186.667" fill="#000" font-size="14" textLength="138.277">It will work this way</text><text x="17" y="202.964" fill="#000" font-size="14" textLength="428.148">You may contact the PlantUML team at plantuml@gmail.com</text><text x="17" y="219.261" fill="#000" font-size="14" textLength="749.376">But you should also probably contact the plugin authors you are currently using and send them this image</text><text x="17" y="235.558" fill="#000" font-size="14"> </text><text x="17" y="251.854" fill="#000" font-size="14" textLength="232.545">For the record, here is your data:</text><text x="17" y="268.151" fill="#000" font-size="14"> </text><text x="17" y="284.448" fill="#000" font-size="14" textLength="687.442">jVRBTxpBGL3Pr9jGi6YHsWDSwKFWC0l7VJNevGxhrBtgl yutbaYQFMQrMpasZZIFSoK0XTRkkYCFv6M</text><text x="17" y="300.745" fill="#000" font-size="14" textLength="719.729">M7t78i90dmZB1Jg0cIDve9 b9723sxOKysvqYjQCHqkLMAq5WIQXRKCEBTHGy3yU44Oq8E5Ql7mPgOMm</text><text x="17" y="317.042" fill="#000" font-size="14" textLength="677.359">JTkE5SkpIsnckNvttkt8MPxWlhbFkFMO O0P6QQkUXVqLpcLrAyQKktCNMKL8D7p Ph4vzS7IATDIlQU</text><text x="17" y="333.339" fill="#000" font-size="14" textLength="680.005">7sl9OlaYET5AbszT 6cuRyD3RoqEbp3Gy7K0RI9y5j0ez21Cu7ACgCqoZN7I13DmwtQrZj2Ja2X0Yxc3</text><text x="17" y="349.636" fill="#000" font-size="14" textLength="699.631">GlZyG 11AIgP Z8GXAF-HDebSP85ysBxQG0EXlPvWru60Wgb7QMf8KLyKUoXcKOG0utX3TJO1ufE68sM</text><text x="17" y="365.933" fill="#000" font-size="14" textLength="661.753">G0Laxqj1STf081Gc-YKLLZS7uL7MkjGzs41SR9bJOlFglJI cmogEHD7XXHGjLRN47QeB94 BJfK5LcP</text><text x="17" y="382.229" fill="#000" font-size="14" textLength="659.853">CPPc8E3x16FR1p NcCRZkRvG3 sjZG0vyuyhdotpoHImp TlmIrWSqieJl8ySWUQqJE-wBnt1etZlFuf</text><text x="17" y="398.526" fill="#000" font-size="14" textLength="688.905">lcJQpPjnwSAJ5fE0nJehstDDmt082tunKJRbY-RsZx AEQVyw0g7HrlBWvmCWa-jnGZUWjaBokoxAMWQ</text><text x="17" y="414.823" fill="#000" font-size="14" textLength="711.211">MP wy16stVDzmB7CrDb-fMYt7WGHiHaWpNldxe0KKtTmRGYWJcHFLN7J4ESVWTdQu2tbv42KNau9RcJD</text><text x="17" y="431.12" fill="#000" font-size="14" textLength="670.421">Gzt9kLOavVz1EO9rTPDLF1fNTbP61cz 9jldvWP81WdgcFEmd2qKPIHwver0cLZqlkl0F-j8k5Vom52t</text><text x="17" y="447.417" fill="#000" font-size="14" textLength="685.733">3hD1izWM9jbeL9oN5qmjro-yuMZw8YStzMaprwROne0POeHRjVgot3QPpI -nbHAKXYgatJwS