spring:
  datasource:
    url: jdbc:mysql://mysql:3306/zhuanzhuan?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root123}

  data:
    redis:
      host: redis
      password: ${REDIS_PASSWORD}

  mail:
    host: ${MAIL_SERVER}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    default-encoding: UTF-8
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: ${MAIL_USE_SSL}
      mail.smtp.starttls.enable: ${MAIL_USE_TLS}
      mail.smtp.ssl.trust: ${MAIL_SERVER}

