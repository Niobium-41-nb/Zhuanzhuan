<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#FDFBF7"/><image href="../images/hzau-logo.png" x="1120" y="14" width="130" height="37" preserveAspectRatio="xMaxYMid meet" opacity="0.85"/><rect x="0" y="0" width="1280" height="4" fill="#52B788"/><rect x="60" y="30" width="6" height="32" rx="3" fill="#52B788"/><text x="78" y="54" font-family="Noto Sans SC,sans-serif" font-size="28" font-weight="700" fill="#1F2937">李硕 — 前端开发</text><circle cx="100" cy="120" r="36" fill="#52B788"/><text x="100" y="128" text-anchor="middle" font-size="24" fill="white" font-weight="700">李</text><text x="155" y="120" font-family="Noto Sans SC,sans-serif" font-size="20" font-weight="700" fill="#1F2937">李硕</text><rect x="155" y="135" width="180" height="22" rx="4" fill="#E8F5E9"/><text x="245" y="151" text-anchor="middle" font-size="11" fill="#52B788" font-weight="600">前端开发工程师</text>
<text x="80" y="200" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#52B788">首页与商品模块</text><rect x="80" y="215" width="550" height="265" rx="8" fill="white" stroke="#E5E7EB"/><text x="100" y="243" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">Hero 横幅</tspan>  渐变绿色背景 + 品牌标语 + 实时统计数据展示</text><text x="100" y="268" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">公告栏滚动</tspan>  CSS Animation 水平轮播，鼠标悬停暂停</text><text x="100" y="293" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">商品分类导航</tspan>  8 个分类 Tab（Emoji 图标），点击切换加载</text><text x="100" y="318" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">商品网格</tspan>  响应式 Grid 布局 (minmax 240px)，卡片 hover 放大效果</text><text x="100" y="343" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">相对时间格式化</tspan>  刚刚 / X分钟前 / X小时前 / X天前 / 日期</text><text x="100" y="368" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">商品列表页</tspan>  多条件筛选（关键词/分类/价格/成色/排序）+ URL 参数同步</text><text x="100" y="393" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">商品详情页</tspan>  图片画廊（主图+缩略图）、成色标签、HTML 安全过滤</text><text x="100" y="418" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">商品发布页</tspan>  分类级联选择、多图上传 picture-card、表单校验</text><text x="100" y="443" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">封面图回退机制</tspan>  getCategoryCover 函数，加载失败返回 Emoji 占位</text>
<text x="680" y="200" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#52B788">购物车与订单列表</text><rect x="680" y="215" width="540" height="265" rx="8" fill="white" stroke="#E5E7EB"/><text x="700" y="243" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">购物车页面</tspan>  复选框选择 + 数量调节 + 全选/取消 + 结算栏</text><text x="700" y="268" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">数量防抖同步</tspan>  修改数量后防抖提交后端，避免频繁请求</text><text x="700" y="293" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">空状态引导</tspan>  购物车为空时展示友好提示</text><text x="700" y="318" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">订单列表</tspan>  6 个状态 Tab 切换 + 买家/卖家视角切换</text><text x="700" y="343" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">订单卡片</tspan>  订单号 + 商品标题 + 价格 + 状态标签 + 时间</text><text x="700" y="368" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">状态映射函数</tspan>  statusType() 在 4 个页面复用，避免重复代码</text>
<text x="80" y="520" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#52B788">种子数据与图片优化</text><rect x="80" y="535" width="1140" height="55" rx="8" fill="white" stroke="#E5E7EB"/><text x="110" y="560" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937">编写 15 个用户 + 217 件商品种子 SQL（20 个分类） | 三版图片方案迭代：LoremFlickr → Picsum.photos 随机 → 按分类种子前缀 | Pravatar 个性化头像</text>
<rect x="0" y="717" width="1280" height="3" fill="#52B788"/><text x="1240" y="705" text-anchor="end" font-family="Noto Sans SC,sans-serif" font-size="11" fill="#9CA3AF">8 / 15</text></svg>