<text x="80" y="200" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#2D6A4F">项目管理</text><rect x="80" y="215" width="550" height="180" rx="8" fill="white" stroke="#E5E7EB"/><text x="100" y="245" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">项目计划</tspan>  制定 7 天开发计划，分解 80+ 任务项</text><text x="100" y="272" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">角色分配</tspan>  2 前端 + 2 后端 + 1 全栈的项目组织结构</text><text x="100" y="299" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">每日站会</tspan>  沟通进度，协调前后端接口 30+ 个</text><text x="100" y="326" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">版本控制</tspan>  Git 分支管理，15+ commits，解决合并冲突</text><text x="100" y="353" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">多环境配置</tspan>  .env / application-{dev,prod}.yml / settings-docker.xml</text><text x="100" y="380" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">README</tspan>  18KB 项目文档，含环境配置 + 部署指南 + 故障排查</text>
<text x="80" y="435" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#2D6A4F">测试与质量保证</text><rect x="80" y="450" width="550" height="140" rx="8" fill="white" stroke="#E5E7EB"/><text x="100" y="480" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">Postman 接口测试</tspan>  覆盖注册/登录/商品/订单/消息/管理 7 大模块</text><text x="100" y="507" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">JUnit 单元测试</tspan>  14 个后端测试用例全部通过</text><text x="100" y="534" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">前后端联调</tspan>  逐接口验证数据格式、状态码、异常处理</text><text x="100" y="561" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">Bug 定位与修复</tspan>  发现中文乱码、时区偏移、JWT Token 过期等关键问题</text>
<text x="680" y="200" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#E76F51">核心贡献总结</text><rect x="680" y="215" width="540" height="375" rx="8" fill="#FFF8F0"/><text x="710" y="255" font-family="Noto Sans SC,sans-serif" font-size="14" font-weight="700" fill="#E76F51">Docker 部署架构</text><text x="710" y="278" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">4 容器编排 + 健康检查 + 数据卷 + 网络隔离 + 一键启动</text><text x="710" y="315" font-family="Noto Sans SC,sans-serif" font-size="14" font-weight="700" fill="#E76F51">完整文档体系</text><text x="710" y="338" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">7 份软件工程文档，覆盖需求→设计→测试→使用全流程</text><text x="710" y="375" font-family="Noto Sans SC,sans-serif" font-size="14" font-weight="700" fill="#E76F51">管理后台全功能</text><text x="710" y="398" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">5 个管理页面 + 搜索筛选分页 + 7 种状态流转操作</text><text x="710" y="435" font-family="Noto Sans SC,sans-serif" font-size="14" font-weight="700" fill="#E76F51">测试覆盖</text><text x="710" y="458" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">Postman 30+ 接口测试 + JUnit 14 单元测试全通过</text><text x="710" y="495" font-family="Noto Sans SC,sans-serif" font-size="14" font-weight="700" fill="#E76F51">团队协调</text><text x="710" y="518" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">5 人团队 7 天高效协作，前后端 0 阻塞交付</text><text x="710" y="555" font-family="Noto Sans SC,sans-serif" font-size="14" font-weight="700" fill="#E76F51">代码统计</text><text x="710" y="578" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">前端 18,000+ 行 / 后端 8,000+ 行 / SQL 1,400+ 行</text>
