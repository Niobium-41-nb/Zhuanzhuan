<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#FDFBF7"/><image href="../images/hzau-logo.png" x="1120" y="14" width="130" height="37" preserveAspectRatio="xMaxYMid meet" opacity="0.85"/><rect x="0" y="0" width="1280" height="4" fill="#E76F51"/><rect x="60" y="30" width="6" height="32" rx="3" fill="#E76F51"/><text x="78" y="54" font-family="Noto Sans SC,sans-serif" font-size="28" font-weight="700" fill="#1F2937">刘轩霆 — 后端开发 A</text><circle cx="100" cy="120" r="36" fill="#E76F51"/><text x="100" y="128" text-anchor="middle" font-size="24" fill="white" font-weight="700">刘</text><text x="155" y="120" font-family="Noto Sans SC,sans-serif" font-size="20" font-weight="700" fill="#1F2937">刘轩霆</text><rect x="155" y="135" width="180" height="22" rx="4" fill="#FFF3E0"/><text x="245" y="151" text-anchor="middle" font-size="11" fill="#E65100" font-weight="600">后端开发工程师</text>
<text x="80" y="200" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#E76F51">用户认证与安全框架</text><rect x="80" y="215" width="550" height="240" rx="8" fill="white" stroke="#E5E7EB"/><text x="100" y="243" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">Spring Security + JWT</tspan>  无状态认证架构 + BCrypt 密码加密</text><text x="100" y="268" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">JWT 双 Token 机制</tspan>  Access Token 2h + Refresh Token 7d + 自动刷新</text><text x="100" y="293" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">Token 黑名单</tspan>  登出时加入 Redis 黑名单，防止泄露 Token 被复用</text><text x="100" y="318" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">三级权限控制</tspan>  公开接口 / 认证接口 / 管理员接口 (ROLE_ADMIN)</text><text x="100" y="343" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">登录频率限制</tspan>  10次/15分钟 IP 级别防暴力破解</text><text x="100" y="368" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">验证码机制</tspan>  邮件验证码 + 5 分钟有效期 + 3次/5分钟频率限制</text><text x="100" y="393" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">CORS 跨域配置</tspan>  白名单来源 + AllowCredentials 安全设置</text><text x="100" y="418" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">全局异常处理</tspan>  RestControllerAdvice 统一异常响应</text>
<text x="680" y="200" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#E76F51">商品模块 API</text><rect x="680" y="215" width="540" height="240" rx="8" fill="white" stroke="#E5E7EB"/><text x="700" y="243" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">商品发布</tspan>  多图关联 + 封面自动设置 + 表单校验 (DTO @Valid)</text><text x="700" y="268" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">商品列表查询</tspan>  分页 + 多条件筛选 + 排序 + MySQL FULLTEXT 全文搜索</text><text x="700" y="293" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">批量加载优化</tspan>  分类名 + 卖家信息一次 SQL 查询避免 N+1 问题</text><text x="700" y="318" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">浏览量统计</tspan>  非卖家浏览才 +1，防刷</text><text x="700" y="343" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">分类树查询</tspan>  递归构建二级分类树，Redis 缓存减少 DB 查询</text><text x="700" y="368" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">商品状态管理</tspan>  在售/下架/已售出/待审核/审核驳回 5 种状态流转</text><text x="700" y="393" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">收藏功能</tspan>  收藏/取消收藏 + 收藏列表分页</text>
<text x="80" y="490" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#E76F51">订单核心流程</text><rect x="80" y="505" width="1140" height="55" rx="8" fill="white" stroke="#E5E7EB"/><text x="110" y="530" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">悲观锁</tspan>  selectByIdForUpdate 防双重出售 | <tspan font-weight="700">自买自卖校验</tspan>  不能购买自己的商品 | <tspan font-weight="700">状态机</tspan>  待付款→待发货→待收货→已完成/已取消 | <tspan font-weight="700">订单日志</tspan>  每次状态变更记录操作人和备注 | <tspan font-weight="700">订单号</tspan>  ORD + 时间戳 + 随机数</text>
<rect x="0" y="717" width="1280" height="3" fill="#E76F51"/><text x="1240" y="705" text-anchor="end" font-family="Noto Sans SC,sans-serif" font-size="11" fill="#9CA3AF">10 / 15</text></svg>