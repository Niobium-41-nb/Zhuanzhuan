<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#FDFBF7"/><image href="../images/hzau-logo.png" x="1120" y="14" width="130" height="37" preserveAspectRatio="xMaxYMid meet" opacity="0.85"/><rect x="0" y="0" width="1280" height="4" fill="#E76F51"/><rect x="60" y="30" width="6" height="32" rx="3" fill="#E76F51"/><text x="78" y="54" font-family="Noto Sans SC,sans-serif" font-size="28" font-weight="700" fill="#1F2937">胡欣悦 — 后端开发 B</text><circle cx="100" cy="120" r="36" fill="#E76F51"/><text x="100" y="128" text-anchor="middle" font-size="24" fill="white" font-weight="700">胡</text><text x="155" y="120" font-family="Noto Sans SC,sans-serif" font-size="20" font-weight="700" fill="#1F2937">胡欣悦</text><rect x="155" y="135" width="180" height="22" rx="4" fill="#FFF3E0"/><text x="245" y="151" text-anchor="middle" font-size="11" fill="#E65100" font-weight="600">后端开发工程师</text>
<text x="80" y="200" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#E76F51">购物车模块</text><rect x="80" y="215" width="550" height="160" rx="8" fill="white" stroke="#E5E7EB"/><text x="100" y="245" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">添加商品</tspan>  自动去重（同一用户同一商品只保留一条）</text><text x="100" y="272" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">购物车列表</tspan>  返回商品详情 + 数量 + 是否选中</text><text x="100" y="299" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">修改数量</tspan>  quantity 更新 API + 参数校验</text><text x="100" y="326" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">删除商品</tspan>  购物车项删除 + 权限校验（只能删自己的）</text><text x="100" y="353" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">选中/取消选中</tspan>  selected 字段切换，结算时只计算选中项</text>
<text x="680" y="200" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#E76F51">消息与通知模块</text><rect x="680" y="215" width="540" height="160" rx="8" fill="white" stroke="#E5E7EB"/><text x="700" y="245" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">站内信</tspan>  MessageController 5 个端点：发送/接收/会话/已读/未读</text><text x="700" y="272" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">系统通知</tspan>  NotificationController 3 个端点：列表/标记已读/未读数</text><text x="700" y="299" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">会话聚合</tspan>  按对话方分组 + 最后消息 + 未读计数</text><text x="700" y="326" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">标记已读</tspan>  批量 UPDATE 对方发来的未读消息</text><text x="700" y="353" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">未读计数</tspan>  消息 + 通知双维度实时未读计数</text>
<text x="80" y="415" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#E76F51">数据统计</text><rect x="80" y="430" width="550" height="130" rx="8" fill="white" stroke="#E5E7EB"/><text x="100" y="460" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">首页统计</tspan>  /index/statistics → 用户总数/商品总数/订单总数</text><text x="100" y="487" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">分类统计</tspan>  /category/list → 树形结构查询 + Redis 缓存</text><text x="100" y="514" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">管理后台统计</tspan>  /admin/statistics → 用户量/商品量/成交量/分类占比/趋势</text><text x="100" y="541" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">公告列表</tspan>  /announcement/list → 公开接口无需认证</text>
<text x="680" y="415" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#E76F51">文件上传</text><rect x="680" y="430" width="540" height="130" rx="8" fill="white" stroke="#E5E7EB"/><text x="700" y="460" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">通用上传接口</tspan>  /upload/image → multipart/form-data 接收</text><text x="700" y="487" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">格式校验</tspan>  MIME 类型白名单（jpg/jpeg/png/gif/webp）</text><text x="700" y="514" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">大小限制</tspan>  单文件 5MB，请求 50MB</text><text x="700" y="541" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">持久化存储</tspan>  Docker Volume 挂载到 /data/zhuanzhuan/uploads</text>
<rect x="0" y="717" width="1280" height="3" fill="#E76F51"/><text x="1240" y="705" text-anchor="end" font-family="Noto Sans SC,sans-serif" font-size="11" fill="#9CA3AF">12 / 15</text></svg>