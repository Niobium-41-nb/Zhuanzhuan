<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#FDFBF7"/><image href="../images/hzau-logo.png" x="1120" y="14" width="130" height="37" preserveAspectRatio="xMaxYMid meet" opacity="0.85"/><rect x="0" y="0" width="1280" height="4" fill="#52B788"/><rect x="60" y="30" width="6" height="32" rx="3" fill="#52B788"/><text x="78" y="54" font-family="Noto Sans SC,sans-serif" font-size="28" font-weight="700" fill="#1F2937">阮崇轩 — 前端开发</text><circle cx="100" cy="120" r="36" fill="#52B788"/><text x="100" y="128" text-anchor="middle" font-size="24" fill="white" font-weight="700">阮</text><text x="155" y="120" font-family="Noto Sans SC,sans-serif" font-size="20" font-weight="700" fill="#1F2937">阮崇轩</text><rect x="155" y="135" width="180" height="22" rx="4" fill="#E8F5E9"/><text x="245" y="151" text-anchor="middle" font-size="11" fill="#52B788" font-weight="600">前端开发工程师</text>
<text x="80" y="200" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#52B788">前端工程搭建与用户认证</text><rect x="80" y="215" width="550" height="240" rx="8" fill="white" stroke="#E5E7EB"/><text x="100" y="243" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">Vue3 + TS + Vite 工程</tspan>  项目初始化，配置 Element Plus 按需导入、Pinia、Router</text><text x="100" y="268" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">CSS 设计令牌体系</tspan>  CSS Variables 全局主题变量，覆盖 Element Plus 默认风格</text><text x="100" y="293" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">登录页面</tspan>  渐变背景 + 浮动几何图形动画，支持用户名/邮箱/手机号登录</text><text x="100" y="318" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">注册页面</tspan>  邮箱验证码注册，60 秒倒计时防重复点击，前端格式校验</text><text x="100" y="343" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">找回密码（原创）</tspan>  两步流程设计（邮箱验证 → 新密码），密码强度+一致性校验</text><text x="100" y="368" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">Axios 封装</tspan>  Token 自动注入 + 401 刷新队列机制 + 403 自动清除登录</text><text x="100" y="393" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">安全修复</tspan>  验证码类型隔离（注册/重置互斥）+ 防暴力破解频率限制</text><text x="100" y="418" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">修复关键 Bug</tspan>  密码重置验证码被提前消费、旧 Token 导致全站 403</text>
<text x="680" y="200" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#52B788">消息通知系统</text><rect x="680" y="215" width="540" height="240" rx="8" fill="white" stroke="#E5E7EB"/><text x="700" y="243" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">消息页完整重写</tspan>  双栏布局（340px 会话列表 + 自适应聊天面板）</text><text x="700" y="268" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">聊天气泡设计</tspan>  我方绿色圆角右对齐、对方灰色圆角左对齐 + 时间戳</text><text x="700" y="293" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">URL 参数自动开聊</tspan>  ?to=userId 自动打开指定用户会话，支持发起新对话</text><text x="700" y="318" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">商品页联系卖家</tspan>  卖家卡片新增绿色按钮，点击直达聊天窗口</text><text x="700" y="343" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">30 秒轮询刷新</tspan>  未读消息数和通知数自动更新</text><text x="700" y="368" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">通知铃铛</tspan>  Bell 图标 + Popover 下拉面板 + 点击标记已读</text><text x="700" y="393" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">后端通知触发</tspan>  发消息 / 下单 / 付款 / 发货 / 收货自动创建通知</text>
<text x="80" y="490" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#52B788">订单详情页全面重写</text><rect x="80" y="505" width="1140" height="55" rx="8" fill="white" stroke="#E5E7EB"/><text x="110" y="530" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937">买家-卖家双视角操作判断 | 待付款→支付/取消 | 待发货→卖家录入物流 | 待收货→确认收货 | 已完成→星级评价 | 订单时间线可视化</text>
