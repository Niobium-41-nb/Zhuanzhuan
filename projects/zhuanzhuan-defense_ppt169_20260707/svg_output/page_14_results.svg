<text x="80" y="250" font-family="Noto Sans SC,sans-serif" font-size="20" font-weight="700" fill="#2D6A4F">技术成果</text><rect x="80" y="270" width="550" height="200" rx="8" fill="white" stroke="#E5E7EB"/><text x="100" y="300" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">前端</tspan>  Vue3 + TypeScript + Element Plus + Pinia + ECharts</text><text x="100" y="325" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">后端</tspan>  SpringBoot 3.2 + MyBatis-Plus + Security + JWT + Knife4j</text><text x="100" y="350" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">数据库</tspan>  MySQL 8.0 (13 张表 / InnoDB / 全文索引 / utf8mb4)</text><text x="100" y="375" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">缓存</tspan>  Redis 7 (验证码 / Token 黑名单 / 分类树缓存)</text><text x="100" y="400" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">部署</tspan>  Docker Compose 4 容器编排 + 一键部署</text><text x="100" y="425" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">代码量</tspan>  前端 18,000+ 行 + 后端 8,000+ 行 + SQL 1,400+ 行</text><text x="100" y="450" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">文档</tspan>  7 份规范化软件工程文档</text>
<text x="680" y="250" font-family="Noto Sans SC,sans-serif" font-size="20" font-weight="700" fill="#E76F51">项目亮点</text><rect x="680" y="270" width="540" height="200" rx="8" fill="#FFF8F0"/><text x="710" y="300" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">完整 C2C 交易闭环</tspan>  商品发布→浏览→沟通→下单→付款→发货→收货→评价</text><text x="710" y="325" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">JWT 双 Token 无感刷新</tspan>  请求队列排队机制防并发冲突</text><text x="710" y="350" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">安全防护多层设计</tspan>  BCrypt + 频率限制 + 验证码隔离 + 角色鉴权</text><text x="710" y="375" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">UI 动效与交互</tspan>  骨架屏 + 页面过渡 + 滚动感知 + 微交互</text><text x="710" y="400" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">消息通知实时化</tspan>  站内信 + 系统通知 + 订单状态通知联动</text><text x="710" y="425" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">Docker 容器化部署</tspan>  一键启动 + 健康检查 + 数据持久化</text><text x="710" y="450" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">前后端分离 + 协同开发</tspan>  30+ RESTful API + JSON 统一响应格式</text>
