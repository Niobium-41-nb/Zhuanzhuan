<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FDFBF7"/>

  <!-- HZAU Logo top right -->
  <image href="../images/hzau-logo.png" x="1120" y="14" width="130" height="37" preserveAspectRatio="xMaxYMid meet" opacity="0.85"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="#2D6A4F"/>

  <!-- Page title -->
  <rect x="60" y="30" width="6" height="32" rx="3" fill="#2D6A4F"/>
  <text x="78" y="54" font-family="'Noto Sans SC', sans-serif" font-size="28" font-weight="700" fill="#1F2937">项目概述</text>

  <!-- Two-column layout -->
  <!-- Left: Project intro -->
  <text x="80" y="110" font-family="'Noto Sans SC', sans-serif" font-size="18" font-weight="700" fill="#2D6A4F">▎项目背景</text>
  <text x="80" y="140" font-family="'Noto Sans SC', sans-serif" font-size="15" fill="#1F2937">
    <tspan x="80" dy="0">校园内闲置物品交易需求旺盛，但缺乏安全便捷的校内 C2C 交易平台。</tspan>
    <tspan x="80" dy="26">本项目「转转」旨在为高校师生提供一个可信赖的二手物品交易平台，</tspan>
    <tspan x="80" dy="26">涵盖商品发布、浏览搜索、在线沟通、订单交易全流程。</tspan>
  </text>

  <!-- Right: Key stats -->
  <rect x="700" y="95" width="500" height="200" rx="10" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="730" y="125" font-family="'Noto Sans SC', sans-serif" font-size="16" font-weight="700" fill="#2D6A4F">项目概况</text>

  <text x="730" y="160" font-family="'Noto Sans SC', sans-serif" font-size="14" fill="#6B7280">开发周期</text>
  <text x="900" y="160" font-family="'Noto Sans SC', sans-serif" font-size="14" font-weight="600" fill="#1F2937">2026.7.4 — 7.10（7天）</text>

  <text x="730" y="190" font-family="'Noto Sans SC', sans-serif" font-size="14" fill="#6B7280">团队规模</text>
  <text x="900" y="190" font-family="'Noto Sans SC', sans-serif" font-size="14" font-weight="600" fill="#1F2937">5 人</text>

  <text x="730" y="220" font-family="'Noto Sans SC', sans-serif" font-size="14" fill="#6B7280">前端代码</text>
  <text x="900" y="220" font-family="'Noto Sans SC', sans-serif" font-size="14" font-weight="600" fill="#1F2937">18,000+ 行</text>

  <text x="730" y="250" font-family="'Noto Sans SC', sans-serif" font-size="14" fill="#6B7280">后端代码</text>
  <text x="900" y="250" font-family="'Noto Sans SC', sans-serif" font-size="14" font-weight="600" fill="#1F2937">8,000+ 行</text>

  <text x="730" y="280" font-family="'Noto Sans SC', sans-serif" font-size="14" fill="#6B7280">API 接口</text>
  <text x="900" y="280" font-family="'Noto Sans SC', sans-serif" font-size="14" font-weight="600" fill="#1F2937">30+ 个</text>

  <!-- Tech stack section -->
  <text x="80" y="200" font-family="'Noto Sans SC', sans-serif" font-size="18" font-weight="700" fill="#2D6A4F">▎技术架构</text>

  <!-- Frontend box -->
  <rect x="80" y="220" width="280" height="140" rx="8" fill="white" stroke="#52B788" stroke-width="2"/>
  <text x="220" y="250" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="15" font-weight="700" fill="#2D6A4F">前端</text>
  <text x="220" y="278" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="12" fill="#6B7280">Vue3 + TypeScript + Vite</text>
  <text x="220" y="298" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="12" fill="#6B7280">Element Plus + Pinia</text>
  <text x="220" y="318" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="12" fill="#6B7280">Axios + ECharts</text>
  <text x="220" y="345" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="11" fill="#52B788">Nginx 反向代理</text>

  <!-- Backend box -->
  <rect x="380" y="220" width="280" height="140" rx="8" fill="white" stroke="#2D6A4F" stroke-width="2"/>
  <text x="520" y="250" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="15" font-weight="700" fill="#2D6A4F">后端</text>
  <text x="520" y="278" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="12" fill="#6B7280">SpringBoot 3.2 + MyBatis-Plus</text>
  <text x="520" y="298" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="12" fill="#6B7280">Spring Security + JWT</text>
  <text x="520" y="318" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="12" fill="#6B7280">MySQL 8.0 + Redis 7</text>
  <text x="520" y="345" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="11" fill="#52B788">Knife4j API 文档</text>

  <!-- Arrow between -->
  <text x="375" y="295" font-size="22" fill="#2D6A4F">→</text>

  <!-- Deploy box -->
  <rect x="680" y="220" width="160" height="140" rx="8" fill="white" stroke="#E76F51" stroke-width="2"/>
  <text x="760" y="250" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="15" font-weight="700" fill="#E76F51">部署</text>
  <text x="760" y="278" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="12" fill="#6B7280">Docker Compose</text>
  <text x="760" y="298" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="12" fill="#6B7280">4 容器编排</text>
  <text x="760" y="318" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="12" fill="#6B7280">Nginx + Tomcat</text>

  <!-- Key features -->
  <text x="80" y="400" font-family="'Noto Sans SC', sans-serif" font-size="18" font-weight="700" fill="#2D6A4F">▎核心功能模块</text>

  <rect x="80" y="420" width="210" height="50" rx="6" fill="#E8F5E9"/>
  <text x="185" y="450" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="14" fill="#2D6A4F">📱 用户认证</text>

  <rect x="310" y="420" width="210" height="50" rx="6" fill="#E8F5E9"/>
  <text x="415" y="450" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="14" fill="#2D6A4F">🛒 商品交易</text>

  <rect x="540" y="420" width="210" height="50" rx="6" fill="#E8F5E9"/>
  <text x="645" y="450" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="14" fill="#2D6A4F">💬 消息通知</text>

  <rect x="770" y="420" width="210" height="50" rx="6" fill="#E8F5E9"/>
  <text x="875" y="450" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="14" fill="#2D6A4F">📦 订单管理</text>

  <rect x="80" y="485" width="210" height="50" rx="6" fill="#FFF3E0"/>
  <text x="185" y="515" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="14" fill="#E65100">🔍 搜索筛选</text>

  <rect x="310" y="485" width="210" height="50" rx="6" fill="#FFF3E0"/>
  <text x="415" y="515" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="14" fill="#E65100">⭐ 收藏关注</text>

  <rect x="540" y="485" width="210" height="50" rx="6" fill="#FFF3E0"/>
  <text x="645" y="515" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="14" fill="#E65100">🛡️ 后台管理</text>

  <rect x="770" y="485" width="210" height="50" rx="6" fill="#FFF3E0"/>
  <text x="875" y="515" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="14" fill="#E65100">📊 数据统计</text>

  <!-- Page number + bottom bar -->
  <rect x="0" y="717" width="1280" height="3" fill="#2D6A4F"/>
  <text x="1240" y="705" text-anchor="end" font-family="'Noto Sans SC', sans-serif" font-size="11" fill="#9CA3AF">2 / 15</text>
</svg>