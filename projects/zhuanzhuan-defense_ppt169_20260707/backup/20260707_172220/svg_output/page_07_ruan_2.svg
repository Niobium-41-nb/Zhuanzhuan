<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#FDFBF7"/><image href="../images/hzau-logo.png" x="1120" y="14" width="130" height="37" preserveAspectRatio="xMaxYMid meet" opacity="0.85"/><rect x="0" y="0" width="1280" height="4" fill="#52B788"/><rect x="60" y="30" width="6" height="32" rx="3" fill="#52B788"/><text x="78" y="54" font-family="Noto Sans SC,sans-serif" font-size="28" font-weight="700" fill="#1F2937">阮崇轩 — UI 动效与交互优化</text><circle cx="100" cy="120" r="36" fill="#52B788"/><text x="100" y="128" text-anchor="middle" font-size="24" fill="white" font-weight="700">阮</text><text x="155" y="120" font-family="Noto Sans SC,sans-serif" font-size="20" font-weight="700" fill="#1F2937">阮崇轩</text>
<text x="80" y="200" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#52B788">UI 动效优化</text><rect x="80" y="215" width="550" height="220" rx="8" fill="white" stroke="#E5E7EB"/><text x="100" y="243" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">页面过渡动画</tspan>  fade/slide 路由切换动画，mode=out-in 平滑过渡</text><text x="100" y="268" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">回到顶部按钮</tspan>  滚动 400px 出现，弹性缩放动画，绿色圆形悬浮按钮</text><text x="100" y="293" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">骨架屏加载</tspan>  Shimmer 动画占位卡片，首页商品列表 8 个骨架先展示</text><text x="100" y="318" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">商品卡片交错入场</tspan>  fadeInUp + animationDelay 瀑布流动画效果</text><text x="100" y="343" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">导航栏滚动感知</tspan>  scroll>10px 时毛玻璃模糊 + 底部阴影</text><text x="100" y="368" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">全局按钮微交互</tspan>  hover 上浮 1px + 阴影 / active 下压回弹 / 平滑 transition</text><text x="100" y="393" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">CSS 动画库</tspan>  shimmer / shake / pulse / fadeInUp / floatAuth / cardIn</text><text x="100" y="418" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">Element Plus 全局覆盖</tspan>  按钮/标签/分页/输入框/卡片统一样式</text>
<text x="680" y="200" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#52B788">后端 Bug 修复贡献</text><rect x="680" y="215" width="540" height="220" rx="8" fill="white" stroke="#E5E7EB"/><text x="700" y="243" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">验证码类型隔离</tspan>  Redis Key 加 type 前缀 (captcha:register:/captcha:reset:)</text><text x="700" y="268" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">验证码防消费</tspan>  校验失败不删除验证码，避免用户重试时出错</text><text x="700" y="293" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">密码重置频率限制</tspan>  5次/15分钟防暴力破解，邮箱格式校验</text><text x="700" y="318" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">重复密码检查</tspan>  重置密码时检查新旧密码是否相同</text><text x="700" y="343" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">卖家浏览不计入</tspan>  仅非卖家浏览时才增加 view_count</text><text x="700" y="368" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">OrderVO 字段补充</tspan>  添加 buyerId/sellerId 支持前端角色判断</text><text x="700" y="393" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">消息→通知联动</tspan>  sendMessage 自动创建系统通知</text><text x="700" y="418" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">订单→通知联动</tspan>  下单/付款/发货/收货各环节自动通知买卖双方</text>
<text x="80" y="475" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#E76F51">技术亮点</text><rect x="80" y="490" width="1140" height="55" rx="8" fill="#FFF8F0"/><text x="110" y="515" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">Token 队列刷新</tspan>  多请求并发 401 只刷新一次，其余排队等待 | <tspan font-weight="700">CSS 设计令牌</tspan>  全局品牌色统一管理 | <tspan font-weight="700">骨架屏</tspan>  提升感知性能 | <tspan font-weight="700">验证码三段式安全</tspan>  类型隔离 + 频率限制 + 防消费</text>
