<text x="80" y="200" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#2D6A4F">Docker 容器化部署</text><rect x="80" y="215" width="550" height="220" rx="8" fill="white" stroke="#E5E7EB"/><text x="100" y="243" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">docker-compose.yml</tspan>  编排 MySQL + Redis + SpringBoot + Nginx 四容器架构</text><text x="100" y="268" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">容器健康检查</tspan>  MySQL/Redis 健康检查，按依赖顺序启动</text><text x="100" y="293" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">数据卷持久化</tspan>  MySQL、Redis、文件上传数据独立 Docker Volume</text><text x="100" y="318" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">Nginx 反向代理</tspan>  API 代理转发 + CORS 处理 + Gzip 压缩 + 限流 30r/s</text><text x="100" y="343" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">中文编码修复</tspan>  排查三道防线：JDBC URL 编码 + MySQL 字符集 + Nginx charset</text><text x="100" y="368" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">时区修复</tspan>  Docker 容器 TZ Asia/Shanghai 解决 8 小时偏移</text><text x="100" y="393" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">多阶段 Dockerfile</tspan>  Maven 编译层 + JRE 运行层，镜像体积最小化</text><text x="100" y="418" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">一键部署</tspan>  docker-compose up -d --build 启动全部服务</text>
<text x="680" y="200" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#2D6A4F">管理后台前端开发</text><rect x="680" y="215" width="540" height="220" rx="8" fill="white" stroke="#E5E7EB"/><text x="700" y="243" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">AdminLayout</tspan>  侧边栏导航 + 路由鉴权 + 响应式折叠</text><text x="700" y="268" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">AdminUsers</tspan>  用户列表、状态启用/禁用、角色分配</text><text x="700" y="293" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">AdminProducts</tspan>  商品审核/驳回、违规下架、编辑弹窗</text><text x="700" y="318" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">AdminOrders</tspan>  订单状态筛选、标记付款/发货/完成/取消</text><text x="700" y="343" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">AdminStats</tspan>  ECharts 饼图 + 折线图数据可视化</text><text x="700" y="368" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">AdminAnnouncements</tspan>  系统公告 CRUD 管理</text><text x="700" y="393" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#1F2937"><tspan font-weight="700">Postman 接口测试</tspan>  30+ 接口系统性测试验证</text>
