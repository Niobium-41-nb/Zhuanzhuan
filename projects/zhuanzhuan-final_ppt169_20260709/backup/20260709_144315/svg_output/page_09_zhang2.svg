<text x="80" y="185" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#2D6A4F">项目管理</text><rect x="80" y="200" width="550" height="180" rx="8" fill="white" stroke="#E5E7EB"/><text x="100" y="230" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">项目计划</tspan> 制定 7 天开发计划，分解 80+ 任务项，分配 5 人角色</text><text x="100" y="258" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">每日站会</tspan> 沟通进度，协调前后端 30+ 接口联调对接</text><text x="100" y="286" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">版本控制</tspan> Git 分支管理，15+ commits，解决合并冲突</text><text x="100" y="314" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">环境配置</tspan> .env / application-{dev,prod,test}.yml / settings-docker.xml</text><text x="100" y="342" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">README</tspan> 18KB 项目文档：环境配置 + 部署指南 + 架构说明 + 故障排查</text>
<text x="80" y="420" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#E76F51">测试与质量保证</text><rect x="80" y="440" width="550" height="130" rx="8" fill="white" stroke="#E5E7EB"/><text x="100" y="470" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">Postman 接口测试</tspan> 覆盖注册/登录/商品/订单/消息/通知/管理 7大模块</text><text x="100" y="498" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">JUnit 单元测试</tspan> 14 个后端测试用例全部通过</text><text x="100" y="526" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">前后端联调</tspan> 逐接口验证数据格式、状态码、异常处理</text><text x="100" y="554" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">Bug 修复</tspan> 中文编码、时区偏移、JWT 401 刷新冲突等关键问题</text>
<text x="680" y="185" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#E76F51">核心贡献</text><rect x="680" y="200" width="540" height="370" rx="8" fill="#FFF8F0"/><text x="710" y="240" font-family="Noto Sans SC,sans-serif" font-size="15" font-weight="700" fill="#E65100">Docker 部署架构</text><text x="710" y="265" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">5 容器编排 + 健康检查 + 数据卷 + 网络隔离</text><text x="710" y="300" font-family="Noto Sans SC,sans-serif" font-size="15" font-weight="700" fill="#E65100">完整文档体系</text><text x="710" y="325" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">7 份软件工程文档，需求→设计→测试→使用</text><text x="710" y="360" font-family="Noto Sans SC,sans-serif" font-size="15" font-weight="700" fill="#E65100">管理后台</text><text x="710" y="385" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">5 个管理页面 + 搜索/筛选/分页 + 7 种状态操作</text><text x="710" y="420" font-family="Noto Sans SC,sans-serif" font-size="15" font-weight="700" fill="#E65100">测试</text><text x="710" y="445" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">Postman 30+ · JUnit 14 全通过</text><text x="710" y="480" font-family="Noto Sans SC,sans-serif" font-size="15" font-weight="700" fill="#E65100">团队协调</text><text x="710" y="505" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">5 人 7 天高效协作，前后端 0 阻塞</text><text x="710" y="540" font-family="Noto Sans SC,sans-serif" font-size="15" font-weight="700" fill="#E65100">代码量</text><text x="710" y="565" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">前端 18,000+ / 后端 8,000+ / SQL 1,400+</text>
