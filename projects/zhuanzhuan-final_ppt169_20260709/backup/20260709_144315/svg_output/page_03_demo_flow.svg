<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#FDFBF7"/><image href="../images/hzau-logo.png" x="1110" y="14" width="140" height="40" preserveAspectRatio="xMaxYMid meet" opacity="0.85"/><rect x="0" y="0" width="1280" height="4" fill="#2D6A4F"/><text x="80" y="56" font-family="Noto Sans SC,sans-serif" font-size="28" font-weight="700" fill="#1F2937">项目演示 · 交易流程与支付系统</text><text x="80" y="82" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#6B7280">完整 C2C 闭环：浏览 → 联系卖家 → 下单(选地址) → 支付(模拟) → 发货 → 收货 → 评价</text>
<text x="80" y="125" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#2D6A4F">下单与地址选择</text><rect x="80" y="140" width="550" height="110" rx="8" fill="white" stroke="#E5E7EB"/><text x="100" y="168" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937">购买前先选择收货地址</text><text x="100" y="193" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">• El-Dialog 弹窗展示地址列表，带单选圆点 + 默认标签</text><text x="100" y="215" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">• 确认下单后创建订单，自动填充收件人/电话/地址</text><text x="100" y="237" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">• 支持从个人中心预先管理地址（CRUD + 设为默认）</text>
<text x="680" y="125" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#E76F51">模拟支付系统</text><rect x="680" y="140" width="540" height="110" rx="8" fill="white" stroke="#E5E7EB"/><text x="700" y="168" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937">PaymentPage 四步支付流程</text><text x="700" y="193" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">① 订单摘要 + 选择支付方式（微信/支付宝/校园卡）</text><text x="700" y="215" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">② 旋转 spinner 处理中（1.5~2.5s 模拟）</text><text x="700" y="237" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">③ 成功：SVG 勾选动画 + 2s 自动跳转 / ④ 失败：抖动 + 重试</text>
<text x="80" y="290" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#2D6A4F">发货与收货</text><rect x="80" y="305" width="550" height="130" rx="8" fill="white" stroke="#E5E7EB"/><text x="100" y="333" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937">卖家发货</text><text x="100" y="358" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">• 订单状态为待发货时，显示「录入物流发货」按钮</text><text x="100" y="380" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">• 弹窗选择物流公司（顺丰/中通/圆通/韵达/EMS等8家）</text><text x="100" y="402" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">• 输入快递单号 → 状态变更为待收货 → 通知买家</text><text x="100" y="424" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">• 物流公司彩色卡片网格选择，带品牌色和选中效果</text>
<text x="680" y="290" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#2D6A4F">收货与评价</text><rect x="680" y="305" width="540" height="130" rx="8" fill="white" stroke="#E5E7EB"/><text x="700" y="333" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937">买家收货确认</text><text x="700" y="358" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">• 待收货时物流信息醒目展示（物流卡片+可复制单号）</text><text x="700" y="380" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">• 确认收货 → 状态变更为已完成 → 通知卖家</text><text x="700" y="402" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">• 评价：El-Rate 星级打分 + 文字评价内容</text><text x="700" y="424" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">• 已取消订单：红色专用取消卡片展示</text>
<rect x="80" y="470" width="1160" height="65" rx="8" fill="white" stroke="#E5E7EB"/><text x="110" y="498" font-family="Noto Sans SC,sans-serif" font-size="15" font-weight="700" fill="#2D6A4F">订单状态可视化进度条</text><text x="340" y="498" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">待付款 → 待发货 → 待收货 → 已完成（当前步骤绿色脉冲高亮 + SVG 勾选动画）</text><text x="110" y="522" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">上下文提示：「请尽快完成支付」「等待卖家发货」「收到商品后请确认收货」「交易已完成」</text>
<rect x="0" y="717" width="1280" height="3" fill="#2D6A4F"/><text x="1230" y="705" text-anchor="end" font-family="Noto Sans SC,sans-serif" font-size="11" fill="#9CA3AF">3 / 22</text></svg>