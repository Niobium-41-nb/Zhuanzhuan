<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#FDFBF7"/><image href="../images/hzau-logo.png" x="1110" y="14" width="140" height="40" preserveAspectRatio="xMaxYMid meet" opacity="0.85"/><rect x="0" y="0" width="1280" height="4" fill="#2D6A4F"/><text x="80" y="56" font-family="Noto Sans SC,sans-serif" font-size="28" font-weight="700" fill="#1F2937">前端设计体系</text>
<text x="80" y="100" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#2D6A4F">CSS 设计令牌</text><rect x="80" y="115" width="560" height="130" rx="8" fill="white" stroke="#E5E7EB"/><text x="100" y="143" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">主色调</tspan> --c-primary: #2D6A4F (森林绿) + --c-primary-dark: #1B4332</text><text x="100" y="168" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">强调色</tspan> --c-accent: #E76F51 (暖橙) + --c-accent-hover: #D65A3E</text><text x="100" y="193" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">背景色</tspan> --c-bg: #FDFBF7 (米白) + --c-surface: #FFFFFF</text><text x="100" y="218" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">文字色</tspan> --c-text: #1F2937 / --c-text-secondary: #6B7280 / --c-muted: #9CA3AF</text><text x="100" y="243" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#6B7280">var(--radius-sm): 8px · var(--radius-md): 12px · var(--radius-lg): 16px · var(--shadow-md): 0 4px 12px rgba(0,0,0,.08)</text>
<text x="680" y="100" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#2D6A4F">组件库统一覆盖</text><rect x="680" y="115" width="540" height="130" rx="8" fill="white" stroke="#E5E7EB"/><text x="700" y="143" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">Element Plus</tspan> 全局覆盖：按钮·标签·分页·输入框·卡片·对话框</text><text x="700" y="168" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">按钮规范</tspan> primary=森林绿 plain=浅绿底 hover=深绿+上浮+阴影</text><text x="700" y="193" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">标签规范</tspan> active=绿色高亮 hover=浅绿色 active-bar=绿色</text><text x="700" y="218" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">卡片规范</tspan> 圆角12px · 边框#E5E7EB · hover阴影提升</text><text x="700" y="243" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#6B7280">21 个页面统一使用这些令牌 · 品牌一致性 100%</text>
<text x="80" y="285" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#2D6A4F">动效系统</text><rect x="80" y="300" width="370" height="100" rx="8" fill="white" stroke="#E5E7EB"/><text x="100" y="328" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">路由过渡</tspan> fade/slide · mode=out-in</text><text x="100" y="353" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">骨架屏</tspan> Shimmer 1.5s 循环</text><text x="100" y="378" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">回到顶部</tspan> 弹性缩放出现/隐藏</text>
<rect x="475" y="300" width="370" height="100" rx="8" fill="white" stroke="#E5E7EB"/><text x="495" y="328" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">滚动导航</tspan> blur(12px) + 阴影</text><text x="495" y="353" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">按钮</tspan> hover上浮 active下压</text><text x="495" y="378" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">卡片</tspan> hover放大1.08x</text>
<rect x="870" y="300" width="350" height="100" rx="8" fill="white" stroke="#E5E7EB"/><text x="890" y="328" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">入场动画</tspan> fadeInUp + delay</text><text x="890" y="353" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">通知铃铛</tspan> Popover 下拉</text><text x="890" y="378" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">支付页</tspan> 勾选+抖动动画</text>
<text x="80" y="440" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#E76F51">用户体验优化</text><rect x="80" y="460" width="1160" height="100" rx="8" fill="#FFF8F0"/><text x="110" y="490" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">实时通信</tspan> 聊天5s轮询+通知30s轮询 | <tspan font-weight="700">地址选择</tspan> 购买前必须选地址 | <tspan font-weight="700">通知可点击</tspan> 跳转订单列表/聊天</text><text x="110" y="515" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">发货流程</tspan> 物流公司卡片选择+单号录入 | <tspan font-weight="700">物流追踪</tspan> 可复制单号+物流卡片展示 | <tspan font-weight="700">评价系统</tspan> El-Rate 星级+文字</text><text x="110" y="540" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">错误处理</tspan> 403过期自动清除 · 网络错误分类提示 · 骨架屏替代白屏 · 空状态友好引导</text>
