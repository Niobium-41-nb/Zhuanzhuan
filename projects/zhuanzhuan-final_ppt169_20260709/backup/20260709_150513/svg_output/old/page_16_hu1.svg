<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#FDFBF7"/><image href="../images/hzau-logo.png" x="1110" y="14" width="140" height="40" preserveAspectRatio="xMaxYMid meet" opacity="0.85"/><rect x="0" y="0" width="1280" height="4" fill="#E76F51"/><text x="80" y="56" font-family="Noto Sans SC,sans-serif" font-size="28" font-weight="700" fill="#1F2937">胡欣悦 · 后端开发 B</text><circle cx="90" cy="120" r="30" fill="#E76F51"/><text x="90" y="128" text-anchor="middle" font-size="20" fill="white" font-weight="700">胡</text><text x="135" y="118" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#1F2937">胡欣悦</text><rect x="135" y="132" width="120" height="20" rx="4" fill="#FFF3E0"/><text x="195" y="147" text-anchor="middle" font-size="10" fill="#E65100" font-weight="600">后端开发</text>
<text x="80" y="185" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#E76F51">购物车与消息通知</text><rect x="80" y="200" width="550" height="200" rx="8" fill="white" stroke="#E5E7EB"/><text x="100" y="228" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">购物车 CRUD</tspan> 添加·列表·修改数量·删除 + 自动去重</text><text x="100" y="254" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">站内信 5 端点</tspan> 发送·接收·会话列表·标记已读·未读计数</text><text x="100" y="280" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">系统通知 3 端点</tspan> 列表·标记已读·未读计数</text><text x="100" y="306" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">会话聚合</tspan> 按对话方分组 + 最后消息 + 未读计数</text><text x="100" y="332" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">自动通知触发</tspan> 发消息时自动创建通知给接收方</text><text x="100" y="358" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">订单通知</tspan> 下单·付款·发货·收货各环节通知买卖双方</text>
<text x="680" y="185" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#E76F51">数据统计</text><rect x="680" y="200" width="540" height="200" rx="8" fill="white" stroke="#E5E7EB"/><text x="700" y="228" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">首页统计</tspan> /index/statistics → 用户总数·商品总数·订单总数</text><text x="700" y="254" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">分类树</tspan> /category/list → 二级分类树结构 + Redis 缓存</text><text x="700" y="280" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">管理后台统计</tspan> 用户量·商品量·成交量·分类占比·每日趋势</text><text x="700" y="306" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">公告模块</tspan> 公开列表(无需认证) + 管理员 CRUD(5端点)</text>
<text x="80" y="440" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#E76F51">文件上传</text><rect x="80" y="460" width="550" height="100" rx="8" fill="white" stroke="#E5E7EB"/><text x="100" y="488" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">/upload/image</tspan> multipart/form-data 接收</text><text x="100" y="514" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">格式校验</tspan> MIME 白名单 (jpg/jpeg/png/gif/webp) · 5MB 限制</text><text x="100" y="540" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">Docker Volume</tspan> /data/zhuanzhuan/uploads 持久化</text>
<text x="680" y="440" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#2D6A4F">Docker 运维</text><rect x="680" y="460" width="540" height="100" rx="8" fill="#E8F5E9"/><text x="700" y="488" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">后端 Dockerfile</tspan> 多阶段构建 (Maven编译 + JRE运行)</text><text x="700" y="514" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">MySQL 初始化</tspan> 建库建表 + 种子数据 + 自定义 my.cnf</text><text x="700" y="540" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">Redis 配置</tspan> 密码认证 + AOF + 健康检查</text>
