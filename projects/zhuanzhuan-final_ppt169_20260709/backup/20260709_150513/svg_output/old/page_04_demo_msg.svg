<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#FDFBF7"/><image href="../images/hzau-logo.png" x="1110" y="14" width="140" height="40" preserveAspectRatio="xMaxYMid meet" opacity="0.85"/><rect x="0" y="0" width="1280" height="4" fill="#2D6A4F"/><text x="80" y="56" font-family="Noto Sans SC,sans-serif" font-size="28" font-weight="700" fill="#1F2937">项目演示 · 消息与通知系统</text><text x="80" y="82" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#6B7280">站内信实时聊天 + 系统通知自动推送 + 订单状态联动通知</text>
<text x="80" y="125" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#2D6A4F">站内信系统</text><rect x="80" y="140" width="550" height="140" rx="8" fill="white" stroke="#E5E7EB"/><text x="100" y="168" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937">双栏聊天界面</text><text x="100" y="193" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">• 左侧 340px 会话列表（头像+昵称+最后消息+未读红点+时间）</text><text x="100" y="215" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">• 右侧聊天气泡面板（我方绿色右对齐/对方灰色左对齐）</text><text x="100" y="237" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">• Enter 快捷发送 + 发送按钮 loading 状态</text><text x="100" y="262" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#2D6A4F">• 实时轮询：每 5 秒自动拉取新消息，无需手动刷新</text>
<text x="680" y="125" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#2D6A4F">通知系统</text><rect x="680" y="140" width="540" height="140" rx="8" fill="white" stroke="#E5E7EB"/><text x="700" y="168" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937">系统通知全链路</text><text x="700" y="193" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">• 头部铃铛图标 + 红色未读徽标 + Popover 下拉列表</text><text x="700" y="215" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">• 30 秒轮询刷新未读消息数和通知数</text><text x="700" y="237" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">• 点击通知可跳转：订单通知→订单列表/消息通知→聊天</text><text x="700" y="262" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#2D6A4F">• 未读通知浅绿背景高亮 + 点击标记已读</text>
<text x="80" y="320" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#E76F51">自动通知触发</text><rect x="80" y="340" width="1160" height="80" rx="8" fill="#FFF8F0"/><text x="110" y="370" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">发消息 →</tspan> 自动给对方创建「XXX 给你发来一条消息」通知</text><text x="110" y="395" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">下单 →</tspan> 通知卖家「您的商品已被下单」 | <tspan font-weight="700">付款 →</tspan> 通知卖家「买家已付款，请发货」 | <tspan font-weight="700">发货 →</tspan> 通知买家「卖家已发货，请查收」</text>
<text x="80" y="455" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#2D6A4F">关键交互细节</text><rect x="80" y="475" width="560" height="100" rx="8" fill="white" stroke="#E5E7EB"/><text x="100" y="503" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937">联系卖家入口</text><text x="100" y="526" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">• 商品详情页卖家卡片「联系卖家」绿色按钮</text><text x="100" y="548" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">• 点击 → /message?to=sellerId 自动打开聊天窗口</text><text x="100" y="570" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">• 未登录自动跳转登录页，登录后继续操作</text>
<rect x="680" y="475" width="560" height="100" rx="8" fill="white" stroke="#E5E7EB"/><text x="700" y="503" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937">空状态与异常处理</text><text x="700" y="526" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">• 无会话时：「暂无消息，去商品页联系卖家吧」</text><text x="700" y="548" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">• 无通知时：「暂无通知」空状态</text><text x="700" y="570" font-family="Noto Sans SC,sans-serif" font-size="13" fill="#6B7280">• 首次聊天：「这是你们第一次聊天，发送消息开始吧」</text>
<rect x="0" y="717" width="1280" height="3" fill="#2D6A4F"/><text x="1230" y="705" text-anchor="end" font-family="Noto Sans SC,sans-serif" font-size="11" fill="#9CA3AF">4 / 22</text></svg>