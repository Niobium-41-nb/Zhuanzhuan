<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#FDFBF7"/><image href="../images/hzau-logo.png" x="1110" y="14" width="140" height="40" preserveAspectRatio="xMaxYMid meet" opacity="0.85"/><rect x="0" y="0" width="1280" height="4" fill="#E76F51"/><text x="80" y="56" font-family="Noto Sans SC,sans-serif" font-size="28" font-weight="700" fill="#1F2937">核心设计 · 安全架构</text>
<text x="80" y="100" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#E76F51">JWT 双 Token 认证机制</text><rect x="80" y="115" width="560" height="150" rx="8" fill="white" stroke="#E5E7EB"/><text x="100" y="145" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">Access Token</tspan>：2 小时有效期，承载 userId + role</text><text x="100" y="172" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">Refresh Token</tspan>：7 天有效期，仅用于刷新 Access Token</text><text x="100" y="199" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">请求队列机制</tspan>：多请求并发 401 时，只发一次刷新请求</text><text x="100" y="226" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">Token 黑名单</tspan>：登出时将 Token ID 加入 Redis，拒绝复用</text><text x="100" y="253" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">实时用户校验</tspan>：过滤器从 DB 重读用户状态和角色</text>
<text x="680" y="100" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#E76F51">三级权限控制</text><rect x="680" y="115" width="540" height="150" rx="8" fill="white" stroke="#E5E7EB"/><text x="700" y="145" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">公开接口</tspan>：首页/商品列表/详情/分类/公告/登录/注册</text><text x="700" y="172" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">认证接口</tspan>：发布/购物车/订单/消息/个人中心/地址</text><text x="700" y="199" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">管理员接口</tspan>：/api/v1/admin/** → ROLE_ADMIN</text><text x="700" y="226" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">CORS 配置</tspan>：白名单来源 + AllowCredentials</text><text x="700" y="253" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">全局异常处理</tspan>：@RestControllerAdvice 统一响应</text>
<text x="80" y="305" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#E76F51">验证码安全体系</text><rect x="80" y="325" width="1160" height="80" rx="8" fill="#FFF8F0"/><text x="110" y="355" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">类型隔离</tspan>：不同用途验证码存在不同 Redis Key（captcha:register:{email} vs captcha:reset:{email}），互相不可借用</text><text x="110" y="378" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">防暴力破解</tspan>：密码重置 5次/15分钟频率限制 · 验证码 3次/5分钟 · 登录 10次/15分钟</text><text x="110" y="401" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">防消费</tspan>：验证码只在业务操作成功后删除，中间任何校验失败不消耗验证码 · 重复密码检查</text>
<text x="80" y="440" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#E76F51">数据库安全</text><rect x="80" y="460" width="560" height="100" rx="8" fill="white" stroke="#E5E7EB"/><text x="100" y="488" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">BCrypt 加密</tspan>：密码哈希存储，不可逆</text><text x="100" y="515" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">软删除</tspan>：@TableLogic，数据可恢复</text><text x="100" y="542" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">SQL 注入防护</tspan>：MyBatis 参数化查询 + 排序白名单校验</text><text x="100" y="568" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">敏感信息脱敏</tspan>：手机号/邮箱在 VO 中自动打码</text>
<rect x="680" y="460" width="540" height="100" rx="8" fill="white" stroke="#E5E7EB"/><text x="700" y="488" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">XSS 防护</tspan>：商品描述 sanitizedDescription 三重过滤</text><text x="700" y="515" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">文件上传安全</tspan>：MIME 类型白名单 · 5MB 大小限制</text><text x="700" y="542" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">Nginx 安全头</tspan>：X-Frame-Options DENY · XSS Protection · nosniff</text><text x="700" y="568" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">.env 管理</tspan>：敏感配置不入库，通过环境变量注入</text>
<rect x="0" y="717" width="1280" height="3" fill="#E76F51"/><text x="1230" y="705" text-anchor="end" font-family="Noto Sans SC,sans-serif" font-size="11" fill="#9CA3AF">6 / 22</text></svg>