<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#FDFBF7"/><image href="../images/hzau-logo.png" x="1110" y="14" width="140" height="40" preserveAspectRatio="xMaxYMid meet" opacity="0.85"/><rect x="0" y="0" width="1280" height="4" fill="#52B788"/><text x="80" y="56" font-family="Noto Sans SC,sans-serif" font-size="28" font-weight="700" fill="#1F2937">李硕 · 前端开发</text><circle cx="90" cy="120" r="30" fill="#52B788"/><text x="90" y="128" text-anchor="middle" font-size="20" fill="white" font-weight="700">李</text><text x="135" y="118" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#1F2937">李硕</text><rect x="135" y="132" width="120" height="20" rx="4" fill="#E8F5E9"/><text x="195" y="147" text-anchor="middle" font-size="10" fill="#52B788" font-weight="600">前端开发</text>
<text x="80" y="185" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#52B788">首页与商品模块</text><rect x="80" y="200" width="550" height="220" rx="8" fill="white" stroke="#E5E7EB"/><text x="100" y="228" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">Hero 横幅</tspan> 渐变绿色背景 + 品牌标语 + 实时统计数据展示</text><text x="100" y="254" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">公告栏</tspan> CSS Animation 水平滚动轮播，鼠标悬停暂停</text><text x="100" y="280" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">分类导航</tspan> 8 个 Emoji 分类 Tab + 选中态绿色高亮</text><text x="100" y="306" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">商品网格</tspan> 响应式 Grid(minmax 240px) + 卡片 hover 放大</text><text x="100" y="332" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">时间格式化</tspan> 刚刚/X分钟前/X小时前/X天前</text><text x="100" y="358" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">商品列表</tspan> 多条件筛选 + URL参数同步 + 分页</text><text x="100" y="384" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">商品详情</tspan> 图片画廊 + 成色标签 + HTML防XSS + 收藏</text><text x="100" y="410" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">商品发布</tspan> 级联分类 + 多图上传 + 表单校验 + 封面回退</text>
<text x="680" y="185" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#52B788">购物车与订单列表</text><rect x="680" y="200" width="540" height="220" rx="8" fill="white" stroke="#E5E7EB"/><text x="700" y="228" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">购物车</tspan> 复选框选择 + 数量调节 +/- + 全选/取消</text><text x="700" y="254" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">结算栏</tspan> 已选N件 + 合计金额 + 去结算按钮</text><text x="700" y="280" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">数量防抖</tspan> 修改后防抖提交后端，避免频繁请求</text><text x="700" y="306" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">订单列表</tspan> 6 个状态 Tab + 买家/卖家视角切换</text><text x="700" y="332" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">订单卡片</tspan> 订单号 + 商品标题 + 价格 + 状态标签</text><text x="700" y="358" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">状态映射</tspan> statusType() 在 4 页面复用，避免重复</text>
<text x="80" y="455" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#52B788">种子数据与图片</text><rect x="80" y="475" width="1160" height="50" rx="8" fill="#E8F5E9"/><text x="110" y="505" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#2D6A4F">217 件商品种子 SQL（20 个分类）· 15 个用户数据 · 三版图片方案迭代 · 最终使用 Unsplash 验证真实照片 + Apple/Xiaomi CDN</text>
