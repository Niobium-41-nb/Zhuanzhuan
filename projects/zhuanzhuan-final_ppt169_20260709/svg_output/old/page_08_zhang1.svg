<text x="80" y="185" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#2D6A4F">Docker 容器化部署</text><rect x="80" y="200" width="550" height="220" rx="8" fill="white" stroke="#E5E7EB"/><text x="100" y="230" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">docker-compose.yml</tspan> 编制 MySQL + Redis + SpringBoot + Nginx + phpMyAdmin 五容器架构</text><text x="100" y="258" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">健康检查</tspan> 按依赖顺序启动，MySQL/Redis healthy 后再启后端</text><text x="100" y="286" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">数据持久化</tspan> 三个 Docker Volume：mysql_data / redis_data / upload_data</text><text x="100" y="314" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">Nginx 配置</tspan> 反向代理 /api/* → backend:8080 · CORS · Gzip · 限流 30r/s</text><text x="100" y="342" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">多环境</tspan> dev/prod/test 配置文件分离 + .env 敏感信息管理</text><text x="100" y="370" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">时区修复</tspan> TZ=Asia/Shanghai 解决 UTC 偏移导致时间显示错误</text><text x="100" y="398" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">MySQL 初始化</tspan> 4 个自动执行脚本：建库→种子数据→索引→图片更新</text>
<text x="680" y="185" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#2D6A4F">管理后台前端</text><rect x="680" y="200" width="540" height="220" rx="8" fill="white" stroke="#E5E7EB"/><text x="700" y="230" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">AdminLayout</tspan> 侧边栏导航 + 路由鉴权 + 响应式折叠</text><text x="700" y="258" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">AdminUsers</tspan> 用户表格 · 启用/禁用 · 角色分配 · 分页</text><text x="700" y="286" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">AdminProducts</tspan> 审核(通过/驳回) · 违规下架 · 编辑弹窗</text><text x="700" y="314" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">AdminOrders</tspan> 状态筛选 · 标记付款/发货/完成/取消</text><text x="700" y="342" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">AdminStats</tspan> ECharts 饼图+折线图 · dispose 防泄漏</text><text x="700" y="370" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">AdminAnnouncements</tspan> 公告 CRUD · 发布/草稿状态</text><text x="700" y="398" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">Postman 测试</tspan> 30+ 接口测试用例编写和执行</text>
