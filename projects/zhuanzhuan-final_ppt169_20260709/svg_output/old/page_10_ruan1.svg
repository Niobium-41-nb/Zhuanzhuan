<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#FDFBF7"/><image href="../images/hzau-logo.png" x="1110" y="14" width="140" height="40" preserveAspectRatio="xMaxYMid meet" opacity="0.85"/><rect x="0" y="0" width="1280" height="4" fill="#52B788"/><text x="80" y="56" font-family="Noto Sans SC,sans-serif" font-size="28" font-weight="700" fill="#1F2937">阮崇轩 · 前端开发</text><circle cx="90" cy="120" r="30" fill="#52B788"/><text x="90" y="128" text-anchor="middle" font-size="20" fill="white" font-weight="700">阮</text><text x="135" y="118" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#1F2937">阮崇轩</text><rect x="135" y="132" width="120" height="20" rx="4" fill="#E8F5E9"/><text x="195" y="147" text-anchor="middle" font-size="10" fill="#52B788" font-weight="600">前端开发</text>
<text x="80" y="185" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#52B788">前端工程与认证模块</text><rect x="80" y="200" width="550" height="200" rx="8" fill="white" stroke="#E5E7EB"/><text x="100" y="228" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">Vue3+TS+Vite 工程</tspan> 初始化 + Element Plus + Pinia + Router + Axios</text><text x="100" y="254" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">CSS 设计令牌</tspan> CSS Variables 全局主题变量，覆盖 Element Plus 默认风格</text><text x="100" y="280" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">登录页面</tspan> 渐变背景 + 浮动几何图形动画，支持用户名/邮箱/手机号</text><text x="100" y="306" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">注册页面</tspan> 邮箱验证码注册 + 60 秒倒计时 + 前端格式校验</text><text x="100" y="332" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">找回密码</tspan> 两步流程：邮箱验证 → 新密码设置 + 强度+一致性校验</text><text x="100" y="358" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">Axios 封装</tspan> Token 自动注入 + 401 队列刷新 + 403 过期清除 + 错误分类</text>
<text x="680" y="185" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#52B788">消息通知系统</text><rect x="680" y="200" width="540" height="200" rx="8" fill="white" stroke="#E5E7EB"/><text x="700" y="228" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">消息页重写</tspan> 双栏布局（340px 会话列表 + 聊天面板）</text><text x="700" y="254" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">聊天气泡</tspan> 我方绿色圆角右对齐 / 对方灰色左对齐 + 时间戳</text><text x="700" y="280" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">实时轮询</tspan> 每 5 秒自动拉取当前会话新消息</text><text x="700" y="306" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">?to=userId</tspan> URL 参数自动打开指定用户会话</text><text x="700" y="332" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">商品页联系卖家</tspan> 绿色按钮 + 未登录自动跳转</text><text x="700" y="358" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">通知铃铛</tspan> Bell 图标 + Popover + 点击跳转 + 30s 轮询</text>
<text x="80" y="440" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#52B788">订单详情与评价</text><rect x="80" y="460" width="550" height="110" rx="8" fill="white" stroke="#E5E7EB"/><text x="100" y="488" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">买家卖家双视角</tspan> 自动判断角色，显示不同操作按钮</text><text x="100" y="514" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">全流程操作</tspan> 支付→发货(物流录入)→收货→星级评价</text><text x="100" y="540" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">状态进度条</tspan> 可视化步骤 + 上下文提示 + 取消红色卡片</text><text x="100" y="566" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">OrderVO 字段补充</tspan> buyerId/sellerId 支持前端角色判断</text>
<text x="680" y="440" font-family="Noto Sans SC,sans-serif" font-size="18" font-weight="700" fill="#E76F51">后端 Bug 修复</text><rect x="680" y="460" width="540" height="110" rx="8" fill="#FFF8F0"/><text x="700" y="488" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">验证码安全</tspan> 类型隔离 + 防暴力破解 + 防消费 + 重复密码检查</text><text x="700" y="514" font-family="Noto Sans SC,sans-serif" font-size="14" fill="#1F2937"><tspan font-weight="700">浏览量</tspan> 非卖家浏览才+1 | <tspan font-weight="700">消息通知联动</tspan> 发消息+订单状态自动创建通知</text>
