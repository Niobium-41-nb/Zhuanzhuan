<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#FDFBF7"/><image href="../images/hzau-logo.png" x="1110" y="14" width="140" height="40" preserveAspectRatio="xMaxYMid meet" opacity="0.85"/><rect x="0" y="0" width="1280" height="4" fill="#52B788"/><text x="80" y="60" font-family="Noto Sans SC,sans-serif" font-size="34" font-weight="700" fill="#1F2937">前端设计与用户体验</text>
<rect x="60" y="100" width="370" height="200" rx="10" fill="white" stroke="#52B788" stroke-width="2"/><rect x="60" y="100" width="370" height="44" rx="10" fill="#52B788"/><rect x="60" y="124" width="370" height="20" fill="#52B788"/><text x="245" y="128" text-anchor="middle" font-size="17" font-weight="700" fill="white">CSS 设计令牌</text><text x="90" y="175" font-size="16" fill="#1F2937">15 个 CSS Variables</text><text x="90" y="205" font-size="15" fill="#6B7280">--c-primary:#2D6A4F 森林绿</text><text x="90" y="230" font-size="15" fill="#6B7280">--c-accent:#E76F51 暖橙</text><text x="90" y="255" font-size="15" fill="#6B7280">--c-bg:#FDFBF7 米白</text><text x="90" y="280" font-size="15" fill="#6B7280">8个圆角/阴影/间距变量</text>
<rect x="455" y="100" width="370" height="200" rx="10" fill="white" stroke="#52B788" stroke-width="2"/><rect x="455" y="100" width="370" height="44" rx="10" fill="#52B788"/><rect x="455" y="124" width="370" height="20" fill="#52B788"/><text x="640" y="128" text-anchor="middle" font-size="17" font-weight="700" fill="white">动效系统</text><text x="485" y="175" font-size="16" fill="#1F2937">骨架屏 Shimmer 加载</text><text x="485" y="205" font-size="16" fill="#1F2937">fade/slide 路由过渡</text><text x="485" y="235" font-size="16" fill="#1F2937">fadeInUp 卡片入场</text><text x="485" y="265" font-size="16" fill="#1F2937">滚动感知毛玻璃导航</text><text x="485" y="295" font-size="16" fill="#1F2937">回到顶部弹性按钮</text>
<rect x="850" y="100" width="370" height="200" rx="10" fill="white" stroke="#52B788" stroke-width="2"/><rect x="850" y="100" width="370" height="44" rx="10" fill="#52B788"/><rect x="850" y="124" width="370" height="20" fill="#52B788"/><text x="1035" y="128" text-anchor="middle" font-size="17" font-weight="700" fill="white">交互优化</text><text x="880" y="175" font-size="16" fill="#1F2937">按钮 hover 上浮+阴影</text><text x="880" y="205" font-size="16" fill="#1F2937">active 下压回弹</text><text x="880" y="235" font-size="16" fill="#1F2937">地址选择对话框</text><text x="880" y="265" font-size="16" fill="#1F2937">支付 spinner+勾选动画</text><text x="880" y="295" font-size="16" fill="#1F2937">订单状态进度条</text>
<rect x="60" y="330" width="1160" height="170" rx="10" fill="white" stroke="#E5E7EB"/><rect x="60" y="330" width="1160" height="44" rx="10" fill="#E76F51"/><rect x="60" y="354" width="1160" height="20" fill="#E76F51"/><text x="640" y="358" text-anchor="middle" font-size="17" font-weight="700" fill="white">实时体验</text>
<text x="90" y="405" font-size="16" fill="#1F2937"><tspan font-weight="700">聊天轮询</tspan> 每 5 秒自动拉取当前会话新消息，无需手动刷新页面</text>
<text x="90" y="440" font-size="16" fill="#1F2937"><tspan font-weight="700">通知轮询</tspan> 每 30 秒自动更新未读消息数+通知数+铃铛红点</text>
<text x="90" y="475" font-size="16" fill="#1F2937"><tspan font-weight="700">一键开聊</tspan> 商品详情页联系卖家 → /message?to=userId 自动打开聊天窗口</text>
