# ============================================================
# Redis 7.x 配置文件 - 校园二手物品交易平台
# ============================================================

# 绑定地址
bind 0.0.0.0

# 端口
port 6379

# 守护进程模式（容器内不启用）
daemonize no

# 日志级别
loglevel notice

# 日志文件
logfile ""

# 数据库数量
databases 16

# 持久化 - RDB
save 900 1
save 300 10
save 60 10000
rdbcompression yes
dbfilename dump.rdb

# 持久化 - AOF（同时开启，保证数据安全）
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# 最大内存限制（需根据实际环境调整）
maxmemory 128mb

# 内存淘汰策略（LRU）
maxmemory-policy allkeys-lru

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128
