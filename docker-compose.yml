services:
  # ============================================================
  # MySQL 8.0 数据库服务
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: zhuanzhuan-mysql
    hostname: mysql
    restart: unless-stopped
    # 仅容器内部网络通信，无需暴露到宿主机
    expose:
      - "3306"
    environment:
      # root 用户密码
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      # 启动时自动创建的数据库名
      MYSQL_DATABASE: zhuanzhuan
      # 创建普通用户（可选）
      MYSQL_USER: ${MYSQL_USER:-zhuanzhuan}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-zhuanzhuan123}
    volumes:
      # 数据持久化到宿主机
      - mysql_data:/var/lib/mysql
      # 启动时自动执行初始化 SQL 脚本
      - ./docs/数据库设计/zhuanzhuan.sql:/docker-entrypoint-initdb.d/01-init.sql
      # 自定义 MySQL 配置
      - ./deploy/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=200
      - --innodb_buffer_pool_size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - zhuanzhuan-net

  # ============================================================
  # Redis 7.x 缓存服务
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: zhuanzhuan-redis
    hostname: redis
    restart: unless-stopped
    # 仅容器内部网络通信，无需暴露到宿主机
    expose:
      - "6379"
    volumes:
      - redis_data:/data
      - ./deploy/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD:-redis123}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - zhuanzhuan-net

  # ============================================================
  # SpringBoot 后端服务
  # ============================================================
  backend:
    build:
      context: ./zhuanzhuan-backend
      dockerfile: Dockerfile
    container_name: zhuanzhuan-backend
    hostname: backend
    restart: unless-stopped
    # 前端 Nginx 已通过内部网络代理 API，无需暴露到宿主机
    expose:
      - "8080"
    volumes:
      - upload_data:/data/zhuanzhuan/uploads
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION:-7200000}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION:-604800000}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zhuanzhuan-net

  # ============================================================
  # Vue3 前端服务（Nginx）
  # ============================================================
  frontend:
    build:
      context: ./zhuanzhuan-frontend
      dockerfile: Dockerfile
    container_name: zhuanzhuan-frontend
    hostname: frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - zhuanzhuan-net

# ============================================================
# 数据卷定义
# ============================================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  upload_data:
    driver: local

# ============================================================
# 网络定义
# ============================================================
networks:
  zhuanzhuan-net:
    driver: bridge
